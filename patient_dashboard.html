<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Profile - CarePlus</title>
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=2">
    <style>
        body {
            background-color: var(--bg-light);
            font-family: 'Outfit', sans-serif;
        }
        .dashboard-container { display: flex; min-height: 100vh; }
        .sidebar { 
            width: 250px; 
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            padding: 2rem 1rem; 
            border-right: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 4px 0 15px rgba(0, 0, 0, 0.03);
            z-index: 10;
        }
        .main-content { flex: 1; padding: 2rem; background: var(--bg-light); }
        .nav-item { 
            padding: 12px 20px; 
            border-radius: 12px; 
            cursor: pointer; 
            margin-bottom: 8px; 
            color: var(--text-light); 
            font-weight: 500; 
            transition: all 0.3s ease;
        }
        .nav-item:hover { 
            background: rgba(37, 99, 235, 0.05); 
            color: var(--primary-blue); 
            transform: translateX(5px);
        }
        .nav-item.active { 
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.1) 0%, rgba(14, 165, 233, 0.1) 100%); 
            color: var(--primary-blue); 
            font-weight: 600;
            border-left: 4px solid var(--primary-blue);
        }
        .nav-item.text-danger:hover {
            background: rgba(220, 53, 69, 0.1);
            color: #dc3545 !important;
        }
        
        .table-modern {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }
        .table-modern th {
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            padding: 10px 20px;
            border: none;
        }
        .table-modern td {
            background: #fff;
            padding: 15px 20px;
            vertical-align: middle;
            border-top: 1px solid rgba(0,0,0,0.02);
            border-bottom: 1px solid rgba(0,0,0,0.02);
            font-size: 0.95rem;
        }
        .table-modern td:first-child {
            border-top-left-radius: 10px;
            border-bottom-left-radius: 10px;
            border-left: 1px solid rgba(0,0,0,0.02);
        }
        .table-modern td:last-child {
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
            border-right: 1px solid rgba(0,0,0,0.02);
        }
        .table-modern tr {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .table-modern tbody tr:hover td {
            background: #fafbfe;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <a href="index.html" class="logo mb-4" style="font-size: 1.2rem;">
                <div class="logo-icon" style="width: 30px; height: 30px;">+</div> CarePlus Patient
            </a>
            <div class="nav-item active" onclick="switchTab('history')">My Bookings</div>
            <div class="nav-item" onclick="switchTab('profile')">My Profile</div>
            <a href="booking.html" class="nav-item text-primary text-decoration-none d-block">Book New Appointment</a>
            <div class="nav-item text-danger mt-5" onclick="logout()">Logout</div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 id="pageTitle" style="font-weight: 800; color: var(--text-dark);">My Bookings</h2>
                <div class="d-flex align-items-center gap-3">
                    <span class="badge rounded-pill px-3 py-2" style="background-color: var(--primary-blue); color: white;">Patient</span>
                </div>
            </div>
            
            <!-- History Tab -->
            <div id="historyTab">
                <div class="glass-card p-4">
                    <div class="table-responsive">
                        <table class="table-modern">
                            <thead>
                                <tr>
                                    <th>Ref No.</th>
                                    <th>Date & Time</th>
                                    <th>Doctor</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="patientHistoryList">
                                <tr><td colspan="5" class="text-center py-4 text-muted">Loading your bookings...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Profile Tab -->
            <div id="profileTab" class="d-none">
                <div class="glass-card p-4 mx-auto" style="max-width: 600px;">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h4 style="font-weight: 700; color: var(--primary-blue); margin: 0;">Personal Details</h4>
                        <button class="btn btn-sm btn-outline-primary rounded-pill px-3" data-bs-toggle="modal" data-bs-target="#editProfileModal">Edit Profile</button>
                    </div>
                    <div class="row mb-3">
                        <div class="col-sm-4 text-muted fw-bold">Name:</div>
                        <div class="col-sm-8 fw-500" id="pName"></div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-sm-4 text-muted fw-bold">Email:</div>
                        <div class="col-sm-8 fw-500" id="pEmail"></div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-sm-4 text-muted fw-bold">Phone:</div>
                        <div class="col-sm-8 fw-500" id="pPhone"></div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-sm-4 text-muted fw-bold">Address:</div>
                        <div class="col-sm-8 fw-500" id="pAddress"></div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-sm-4 text-muted fw-bold">Date of Birth:</div>
                        <div class="col-sm-8 fw-500" id="pDob"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Edit Profile Modal -->
    <div class="modal fade" id="editProfileModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0" style="border-radius: 20px; overflow: hidden;">
                <div class="modal-header border-0 bg-primary text-white p-4">
                    <h5 class="modal-title fw-bold">Edit Profile</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="editProfileForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold small text-uppercase">Full Name</label>
                            <input type="text" id="editName" class="form-control rounded-3" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small text-uppercase">Email Address</label>
                            <input type="email" id="editEmail" class="form-control rounded-3" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small text-uppercase">Phone Number</label>
                            <input type="text" id="editPhone" class="form-control rounded-3" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small text-uppercase">Address</label>
                            <textarea id="editAddress" class="form-control rounded-3" rows="3" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small text-uppercase">Date of Birth</label>
                            <input type="date" id="editDob" class="form-control rounded-3" required>
                        </div>
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary rounded-pill py-2 fw-bold">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js?v=3"></script>
    <script src="js/patient.js?v=2"></script>
</body>
</html>
