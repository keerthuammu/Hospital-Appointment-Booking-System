<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CarePlus</title>
    <!-- Bootstrap CSS framework for responsive layout, forms, buttons and utility classes -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=4">
    <!-- Google Font: Outfit used for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="glass-card" style="background: rgba(255, 255, 255, 0.98) !important; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15) !important; min-height: 60px; border: 1px solid rgba(0,0,0,0.1);">
        <a href="index.html" class="logo">
            <div class="logo-icon">+</div> CarePlus
        </a>
        <div class="nav-links" id="navLinks">
            <a href="index.html#home">Home</a>
            <a href="index.html#specialty">Specialties</a>
            <a href="index.html#doctors">Doctors</a>
            <a href="index.html#contact">Contact</a>
        </div>
        <div class="nav-actions">
            <a href="login.html" class="btn-outline-primary desktop-only auth-btn" style="padding: 0.6rem 1.5rem; font-size: 0.9rem; margin-right: 10px; text-decoration: none; border-radius: 50px; border: 2px solid var(--primary-blue); color: var(--primary-blue); font-weight: 600; background: transparent; transition: all 0.3s ease;">Login</a>
            <a href="booking.html" class="btn-primary desktop-only" style="padding: 0.6rem 1.5rem; font-size: 0.9rem;">Book Now</a>
            <button class="mobile-menu-btn" id="menuBtn">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <div class="auth-section">
        <div class="glass-card" style="width: 100%; max-width: 400px; padding: 2rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 1rem;">
                <div class="logo-icon">+</div> CarePlus
            </a>
            <h2>Welcome Back</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Sign in to your account</p>
        </div>

        <div id="loginAlert" class="alert alert-danger d-none"></div>

        <form id="loginForm">
            <div class="form-group mb-3">
                <label>Email Address</label>
                <input type="email" id="email" class="form-control" required>
            </div>
            <div class="form-group mb-4">
                <label>Password</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn-primary w-100 justify-content-center">Login</button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
            Don't have an account? <a href="register.html" style="color: var(--primary-blue); text-decoration: none; font-weight: 600;">Sign up as Patient</a>
        </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/script.js?v=3"></script>
    <script src="js/auth.js?v=2"></script>
</body>
</html>
