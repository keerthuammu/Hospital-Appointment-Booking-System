<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - CarePlus</title>
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=4">
    <style>
        body {
            background-color: var(--bg-light);
            font-family: 'Outfit', sans-serif;
        }
        .dashboard-container { display: flex; min-height: 100vh; }
        .sidebar { 
            width: 250px; 
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            padding: 2rem 1rem; 
            border-right: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 4px 0 15px rgba(0, 0, 0, 0.03);
            z-index: 10;
        }
        .main-content { flex: 1; padding: 2rem; background: var(--bg-light); }
        .nav-item { 
            padding: 12px 20px; 
            border-radius: 12px; 
            cursor: pointer; 
            margin-bottom: 8px; 
            color: var(--text-light); 
            font-weight: 500; 
            transition: all 0.3s ease;
        }
        .nav-item:hover { 
            background: rgba(37, 99, 235, 0.05); 
            color: var(--primary-blue); 
            transform: translateX(5px);
        }
        .nav-item.active { 
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.1) 0%, rgba(14, 165, 233, 0.1) 100%); 
            color: var(--primary-blue); 
            font-weight: 600;
            border-left: 4px solid var(--primary-blue);
        }
        .nav-item.text-danger:hover {
            background: rgba(220, 53, 69, 0.1);
            color: #dc3545 !important;
        }
        
        .table-modern {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }
        .table-modern th {
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            padding: 10px 20px;
            border: none;
        }
        .table-modern td {
            background: #fff;
            padding: 15px 20px;
            vertical-align: middle;
            border-top: 1px solid rgba(0,0,0,0.02);
            border-bottom: 1px solid rgba(0,0,0,0.02);
            font-size: 0.95rem;
        }
        .table-modern td:first-child {
            border-top-left-radius: 10px;
            border-bottom-left-radius: 10px;
            border-left: 1px solid rgba(0,0,0,0.02);
        }
        .table-modern td:last-child {
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
            border-right: 1px solid rgba(0,0,0,0.02);
        }
        .table-modern tr {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .table-modern tbody tr:hover td {
            background: #fafbfe;
        }

        /* Responsive Dashboard */
        @media (max-width: 992px) {
            .dashboard-container { display: block; }
            .sidebar { 
                width: 100%; 
                padding: 1rem 0.5rem; 
                display: flex; 
                flex-direction: row; 
                flex-wrap: wrap; 
                gap: 8px;
                justify-content: center;
                border-right: none;
                border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            }
            .sidebar .logo { width: 100%; margin-bottom: 10px !important; justify-content: center; }
            .sidebar .nav-item { flex: 1 1 45%; min-width: 120px; text-align: center; margin: 0 !important; padding: 10px; font-size: 0.9rem; }
            .main-content { padding: 1rem; width: 100%; overflow-x: hidden; }
            .d-flex.justify-content-between.align-items-center.mb-4 { flex-direction: column; align-items: flex-start !important; gap: 10px; }
            
            /* Card-based Table Layout for Mobile */
            .table-modern thead { display: none !important; }
            .table-modern, .table-modern tbody, .table-modern tr, .table-modern td { display: block !important; width: 100% !important; border: none !important; }
            .table-modern tr { 
                margin-bottom: 1rem !important; 
                border-radius: 12px; 
                box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
                padding: 1rem; 
                background: #fff; 
            }
            .table-modern td { padding: 0.4rem 0 !important; text-align: left; background: transparent; border-radius: 0 !important; }
            .table-modern td:last-child { 
                border-top: 1px dashed rgba(0,0,0,0.1) !important; 
                margin-top: 0.5rem; 
                padding-top: 1rem !important; 
                display: flex !important; 
                gap: 10px; 
                flex-wrap: wrap; 
            }
            h2#pageTitle, h4 { font-size: 1.5rem !important; }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <a href="index.html" class="logo mb-4" style="font-size: 1.2rem;">
                <div class="logo-icon" style="width: 30px; height: 30px;">+</div> CarePlus Admin
            </a>
            <div class="nav-item active" onclick="switchTab('appointments')">All Appointments</div>
            <div class="nav-item" onclick="switchTab('doctors')">Manage Doctors</div>
            <div class="nav-item text-danger mt-5" onclick="logout()">Logout</div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 id="pageTitle" style="font-weight: 800; color: var(--text-dark);">All Appointments</h2>
                <div class="d-flex align-items-center gap-3">
                    <span class="badge bg-primary rounded-pill px-3 py-2">Administrator</span>
                </div>
            </div>
            
            <!-- Appointments Tab -->
            <div id="appointmentsTab">
                <div class="glass-card p-4">
                    <div class="table-responsive">
                        <table class="table-modern">
                            <thead>
                                <tr>
                                    <th>Ref No.</th>
                                    <th>Patient</th>
                                    <th>Phone</th>
                                    <th>Doctor</th>
                                    <th>Date & Time</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="appointmentsList">
                                <tr><td colspan="6" class="text-center py-4">Loading appointments...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Doctors Tab -->
            <div id="doctorsTab" class="d-none">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 style="font-weight: 700; color: var(--text-dark); margin: 0;">Doctor Directory</h4>
                    <button class="btn-primary" data-bs-toggle="modal" data-bs-target="#addDoctorModal" style="padding: 0.6rem 1.5rem; font-size: 0.9rem;">+ Add Doctor</button>
                </div>
                <div id="doctorsList" class="row g-4 mt-2">
                    <div class="col-12 text-center py-4 text-muted">Loading doctors...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Doctor Modal -->
    <div class="modal fade" id="addDoctorModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add New Doctor</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addDoctorForm">
                        <div class="mb-3">
                            <label>Name</label>
                            <input type="text" id="docName" class="form-control" placeholder="Dr. XYZ" required>
                        </div>
                        <div class="mb-3">
                            <label>Email (for login)</label>
                            <input type="email" id="docEmail" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Specialization</label>
                            <input type="text" id="docSpec" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Experience</label>
                            <input type="text" id="docExp" class="form-control" placeholder="10 Years" required>
                        </div>
                        <div class="mb-3">
                            <label>Fee</label>
                            <input type="text" id="docFee" class="form-control" placeholder="₹500" required>
                        </div>
                        <div class="mb-3">
                            <label>Available Days</label>
                            <input type="text" id="docDays" class="form-control" placeholder="Mon, Wed, Fri" required>
                        </div>
                        <div class="mb-3">
                            <label>Available Slots (comma separated)</label>
                            <input type="text" id="docSlots" class="form-control" placeholder="09:00 AM,10:00 AM" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Add Doctor</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Doctor Modal -->
    <div class="modal fade" id="editDoctorModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0" style="border-radius: 20px; overflow: hidden;">
                <div class="modal-header border-0 bg-primary text-white p-4">
                    <h5 class="modal-title fw-bold">Edit Doctor</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="editDoctorForm">
                        <input type="hidden" id="editDocId">
                        <div class="mb-3">
                            <label class="form-label fw-bold small text-uppercase">Full Name</label>
                            <input type="text" id="editDocName" class="form-control rounded-3" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small text-uppercase">Email</label>
                            <input type="email" id="editDocEmail" class="form-control rounded-3" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small text-uppercase">Specialization</label>
                            <input type="text" id="editDocSpec" class="form-control rounded-3" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold small text-uppercase">Experience</label>
                                <input type="text" id="editDocExp" class="form-control rounded-3" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold small text-uppercase">Fee</label>
                                <input type="text" id="editDocFee" class="form-control rounded-3" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small text-uppercase">Available Days</label>
                            <input type="text" id="editDocDays" class="form-control rounded-3" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small text-uppercase">Available Slots</label>
                            <input type="text" id="editDocSlots" class="form-control rounded-3" required>
                        </div>
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary rounded-pill py-2 fw-bold">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js?v=4"></script>
    <script src="js/admin.js?v=4"></script>
</body>
</html>
