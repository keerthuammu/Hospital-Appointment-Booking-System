<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Dashboard - CarePlus</title>
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=2">
    <style>
        body {
            background-color: var(--bg-light);
            font-family: 'Outfit', sans-serif;
        }
        .dashboard-container { display: flex; min-height: 100vh; }
        .sidebar { 
            width: 250px; 
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            padding: 2rem 1rem; 
            border-right: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 4px 0 15px rgba(0, 0, 0, 0.03);
            z-index: 10;
        }
        .main-content { flex: 1; padding: 2rem; background: var(--bg-light); }
        .nav-item { 
            padding: 12px 20px; 
            border-radius: 12px; 
            cursor: pointer; 
            margin-bottom: 8px; 
            color: var(--text-light); 
            font-weight: 500; 
            transition: all 0.3s ease;
        }
        .nav-item:hover { 
            background: rgba(37, 99, 235, 0.05); 
            color: var(--medical-teal); 
            transform: translateX(5px);
        }
        .nav-item.active { 
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.1) 0%, rgba(14, 165, 233, 0.1) 100%); 
            color: var(--medical-teal); 
            font-weight: 600;
            border-left: 4px solid var(--medical-teal);
        }
        .nav-item.text-danger:hover {
            background: rgba(220, 53, 69, 0.1);
            color: #dc3545 !important;
        }
        
        .table-modern {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }
        .table-modern th {
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            padding: 10px 20px;
            border: none;
        }
        .table-modern td {
            background: #fff;
            padding: 15px 20px;
            vertical-align: middle;
            border-top: 1px solid rgba(0,0,0,0.02);
            border-bottom: 1px solid rgba(0,0,0,0.02);
            font-size: 0.95rem;
        }
        .table-modern td:first-child {
            border-top-left-radius: 10px;
            border-bottom-left-radius: 10px;
            border-left: 1px solid rgba(0,0,0,0.02);
        }
        .table-modern td:last-child {
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
            border-right: 1px solid rgba(0,0,0,0.02);
        }
        .table-modern tr {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .table-modern tbody tr:hover td {
            background: #fafbfe;
        }

        /* Responsive Dashboard */
        @media (max-width: 992px) {
            .dashboard-container { display: block; }
            .sidebar { 
                width: 100%; 
                padding: 1rem 0.5rem; 
                display: flex; 
                flex-direction: row; 
                flex-wrap: wrap; 
                gap: 8px;
                justify-content: center;
                border-right: none;
                border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            }
            .sidebar .logo { width: 100%; margin-bottom: 10px !important; justify-content: center; }
            .sidebar .nav-item { flex: 1 1 45%; min-width: 120px; text-align: center; margin: 0 !important; padding: 10px; font-size: 0.9rem; }
            .main-content { padding: 1rem; width: 100%; overflow-x: hidden; }
            .d-flex.justify-content-between.align-items-center.mb-4 { flex-direction: column; align-items: flex-start !important; gap: 10px; }
            
            /* Card-based Table Layout for Mobile */
            .table-modern thead { display: none !important; }
            .table-modern, .table-modern tbody, .table-modern tr, .table-modern td { display: block !important; width: 100% !important; border: none !important; }
            .table-modern tr { 
                margin-bottom: 1rem !important; 
                border-radius: 12px; 
                box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
                padding: 1rem; 
                background: #fff; 
            }
            .table-modern td { padding: 0.4rem 0 !important; text-align: left; background: transparent; border-radius: 0 !important; }
            .table-modern td:last-child { 
                border-top: 1px dashed rgba(0,0,0,0.1) !important; 
                margin-top: 0.5rem; 
                padding-top: 1rem !important; 
                display: flex !important; 
                gap: 10px; 
                flex-wrap: wrap; 
            }
            h2, h4 { font-size: 1.5rem !important; }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <a href="index.html" class="logo mb-4" style="font-size: 1.2rem;">
                <div class="logo-icon" style="width: 30px; height: 30px;">+</div> CarePlus Doctor
            </a>
            <div class="nav-item active">My Appointments</div>
            <div class="nav-item text-danger mt-5" onclick="logout()">Logout</div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 style="font-weight: 800; color: var(--text-dark);">My Daily Schedule</h2>
                <div class="d-flex align-items-center gap-3">
                    <span class="badge rounded-pill px-3 py-2" style="background-color: var(--medical-teal); color: white;">Doctor</span>
                </div>
            </div>
            
            <div class="glass-card p-4">
                <div class="table-responsive">
                    <table class="table-modern">
                        <thead>
                            <tr>
                                <th>Date & Time</th>
                                <th>Patient Name</th>
                                <th>Contact</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="docAppointmentsList">
                            <tr><td colspan="5" class="text-center py-4">Loading your schedule...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/auth.js?v=3"></script>
    <script src="js/doctor.js?v=2"></script>
</body>
</html>
