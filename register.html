<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Registration - CarePlus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body style="background: #F1F5F9; padding: 2rem 0;">
    
    <div class="container">
        <div class="glass-card" style="max-width: 600px; margin: 0 auto; padding: 2.5rem;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 1rem;">
                    <div class="logo-icon">+</div> CarePlus
                </a>
                <h2>Create an Account</h2>
                <p style="color: var(--text-muted); font-size: 0.9rem;">Join us to manage your medical appointments easily</p>
            </div>

            <div id="regAlert" class="alert alert-danger d-none"></div>

            <form id="registerForm">
                <div class="row">
                    <div class="col-md-6 form-group mb-3">
                        <label>Full Name *</label>
                        <input type="text" id="regName" class="form-control" required>
                    </div>
                    <div class="col-md-6 form-group mb-3">
                        <label>Email Address *</label>
                        <input type="email" id="regEmail" class="form-control" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 form-group mb-3">
                        <label>Password *</label>
                        <input type="password" id="regPassword" class="form-control" required minlength="6">
                    </div>
                    <div class="col-md-6 form-group mb-3">
                        <label>Phone Number *</label>
                        <input type="tel" id="regPhone" class="form-control" required>
                    </div>
                </div>

                <div class="form-group mb-3">
                    <label>Date of Birth *</label>
                    <input type="date" id="regDob" class="form-control" required>
                </div>

                <div class="form-group mb-4">
                    <label>Address</label>
                    <textarea id="regAddress" class="form-control" rows="2"></textarea>
                </div>

                <button type="submit" class="btn-primary w-100 justify-content-center">Register Now</button>
            </form>

            <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
                Already have an account? <a href="login.html" style="color: var(--primary-blue); text-decoration: none; font-weight: 600;">Sign in here</a>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
